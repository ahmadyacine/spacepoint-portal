<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SpacePoint Admin{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700;900&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        space: {
                            900: '#0a0b16',
                            800: '#13152c',
                            accent: '#4FD1C5',
                            hover: '#38B2AC'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0a0b16;
            background-image:
                radial-gradient(circle at 15% 50%, rgba(79, 209, 197, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(20, 22, 50, 0.8) 0%, transparent 50%);
            color: #fff;
            min-height: 100vh;
        }

        .glass-panel {
            background: rgba(19, 21, 44, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Mobile drawer */
        #mobile-drawer {
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #mobile-drawer.open {
            transform: translateX(0);
        }
        #drawer-overlay {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        #drawer-overlay.open {
            opacity: 1;
            pointer-events: all;
        }
    </style>
</head>

<body class="flex bg-space-900 text-white min-h-screen">

    <!-- ═══════════════════════════════════════════
         DESKTOP SIDEBAR (hidden on mobile)
    ═══════════════════════════════════════════ -->
    <aside class="w-64 glass-panel border-r border-white/10 flex flex-col hidden md:flex fixed h-full z-30">
        <div class="h-20 flex items-center justify-center border-b border-white/10">
            <img src="/static/SpacePoint%20logo.png" alt="SpacePoint Logo" class="h-8">
        </div>

        <nav class="flex-grow py-6 px-4 space-y-2">
            <a href="javascript:void(0)" onclick="switchTab('apps')" id="nav-desk-apps"
                class="nav-link-desk flex items-center whitespace-nowrap gap-3 px-4 py-3 rounded-xl transition-all bg-space-accent/10 border border-space-accent/30 text-space-accent font-semibold">
                <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z">
                    </path>
                </svg>
                Applicants
            </a>
            <a href="javascript:void(0)" onclick="switchTab('instructors')" id="nav-desk-instructors"
                class="nav-link-desk flex items-center whitespace-nowrap gap-3 px-4 py-3 rounded-xl transition-all text-gray-400 hover:text-white hover:bg-white/5 border border-transparent">
                <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z">
                    </path>
                </svg>
                Instructors
            </a>
            <a href="javascript:void(0)" onclick="switchTab('invites')" id="nav-desk-invites"
                class="nav-link-desk flex items-center whitespace-nowrap gap-3 px-4 py-3 rounded-xl transition-all text-gray-400 hover:text-white hover:bg-white/5 border border-transparent">
                <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z">
                    </path>
                </svg>
                Invitation Codes
            </a>
            <a href="javascript:void(0)" onclick="switchTab('facs')" id="nav-desk-facs"
                class="nav-link-desk flex items-center whitespace-nowrap gap-3 px-4 py-3 rounded-xl transition-all text-gray-400 hover:text-white hover:bg-white/5 border border-transparent">
                <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
                    </path>
                </svg>
                Facilitators
            </a>
        </nav>

        <div class="px-4 py-6 border-t border-white/10">
            <button onclick="logout()"
                class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 transition-all">
                <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1">
                    </path>
                </svg>
                Sign Out
            </button>
        </div>
    </aside>

    <!-- ═══════════════════════════════════════════
         MOBILE DRAWER (slides in from left)
    ═══════════════════════════════════════════ -->

    <!-- Overlay -->
    <div id="drawer-overlay"
         class="fixed inset-0 bg-black/60 z-40 md:hidden"
         onclick="closeDrawer()"></div>

    <!-- Drawer panel -->
    <div id="mobile-drawer"
         class="fixed top-0 left-0 h-full w-72 z-50 md:hidden flex flex-col"
         style="background: rgba(10, 11, 22, 0.98); border-right: 1px solid rgba(79,209,197,0.15); backdrop-filter: blur(20px);">

        <!-- Drawer header -->
        <div class="h-20 flex items-center justify-between px-6 border-b border-white/10 shrink-0">
            <img src="/static/SpacePoint%20logo.png" alt="SpacePoint Logo" class="h-7">
            <button onclick="closeDrawer()" class="text-gray-400 hover:text-white transition-colors p-1">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <!-- User info strip -->
        <div class="px-6 py-4 border-b border-white/5 shrink-0">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-space-800 border border-space-accent/30 flex items-center justify-center text-space-accent font-bold font-display shrink-0">
                    A
                </div>
                <div class="min-w-0">
                    <p class="text-sm font-semibold text-white truncate">Administrator</p>
                    <p class="text-xs text-space-accent font-medium uppercase tracking-wider">Admin</p>
                </div>
            </div>
        </div>

        <!-- Drawer nav links -->
        <nav class="flex-grow py-4 px-4 space-y-1 overflow-y-auto">
            <a href="javascript:void(0)" onclick="closeDrawer(); switchTab('apps')" id="nav-mob-apps"
                class="nav-link-mob flex items-center whitespace-nowrap gap-3 px-4 py-3 rounded-xl transition-all bg-space-accent/10 border border-space-accent/30 text-space-accent font-semibold">
                <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z">
                    </path>
                </svg>
                Applicants
            </a>
            <a href="javascript:void(0)" onclick="closeDrawer(); switchTab('instructors')" id="nav-mob-instructors"
                class="nav-link-mob flex items-center whitespace-nowrap gap-3 px-4 py-3 rounded-xl transition-all text-gray-400 hover:text-white hover:bg-white/5 border border-transparent">
                <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z">
                    </path>
                </svg>
                Instructors
            </a>
            <a href="javascript:void(0)" onclick="closeDrawer(); switchTab('invites')" id="nav-mob-invites"
                class="nav-link-mob flex items-center whitespace-nowrap gap-3 px-4 py-3 rounded-xl transition-all text-gray-400 hover:text-white hover:bg-white/5 border border-transparent">
                <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z">
                    </path>
                </svg>
                Invitation Codes
            </a>
            <a href="javascript:void(0)" onclick="closeDrawer(); switchTab('facs')" id="nav-mob-facs"
                class="nav-link-mob flex items-center whitespace-nowrap gap-3 px-4 py-3 rounded-xl transition-all text-gray-400 hover:text-white hover:bg-white/5 border border-transparent">
                <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
                    </path>
                </svg>
                Facilitators
            </a>
        </nav>

        <!-- Drawer footer / sign out -->
        <div class="px-4 py-5 border-t border-white/10 shrink-0">
            <button onclick="logout()"
                class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 transition-all">
                <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1">
                    </path>
                </svg>
                Sign Out
            </button>
        </div>
    </div>

    <!-- ═══════════════════════════════════════════
         MAIN CONTENT AREA
    ═══════════════════════════════════════════ -->
    <div class="flex-1 md:ml-64 flex flex-col min-h-screen w-full">

        <!-- Mobile top bar -->
        <header class="md:hidden sticky top-0 z-20 glass-panel border-b border-white/10 flex items-center justify-between px-4 h-16 shrink-0">
            <!-- Hamburger button -->
            <button id="hamburger-btn" onclick="openDrawer()"
                    class="text-gray-300 hover:text-white transition-colors p-2 -ml-2 rounded-lg hover:bg-white/5"
                    aria-label="Open menu">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </button>

            <!-- Logo centered -->
            <img src="/static/SpacePoint%20logo.png" alt="SpacePoint Logo" class="h-6 absolute left-1/2 -translate-x-1/2">

            <!-- Avatar right -->
            <div class="w-8 h-8 rounded-full bg-space-800 border border-space-accent/30 flex items-center justify-center text-space-accent text-sm font-bold font-display">
                A
            </div>
        </header>

        <!-- Desktop top header -->
        <header class="hidden md:flex h-20 items-center justify-between px-8 border-b border-white/5 bg-space-900/50 backdrop-blur-sm shrink-0">
            <h2 class="font-display font-semibold text-lg text-gray-200 capitalize">{% block page_title %}{% endblock %}</h2>
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <p class="text-sm font-semibold text-white">Administrator</p>
                    <p class="text-xs text-space-accent font-medium uppercase tracking-wider">Admin</p>
                </div>
                <div class="w-10 h-10 rounded-full bg-space-800 border border-space-accent/30 flex items-center justify-center text-space-accent font-bold font-display">
                    A
                </div>
            </div>
        </header>

        <!-- Page content -->
        <main class="flex-1 overflow-x-hidden overflow-y-auto bg-transparent p-4 sm:p-6 lg:p-10">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script>
        function openDrawer() {
            document.getElementById('mobile-drawer').classList.add('open');
            document.getElementById('drawer-overlay').classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeDrawer() {
            document.getElementById('mobile-drawer').classList.remove('open');
            document.getElementById('drawer-overlay').classList.remove('open');
            document.body.style.overflow = '';
        }

        // Close drawer on Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeDrawer();
        });

        async function logout() {
            await fetch('/api/auth/logout', { method: 'POST' });
            window.location.href = '/';
        }
    </script>
</body>

</html>
